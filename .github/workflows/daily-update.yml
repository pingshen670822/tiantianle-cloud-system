name: daily-tiantianle-update

on:
  workflow_dispatch:
  schedule:
    # 台灣夏令開獎後嚴格更新窗：09:48-10:00，目標 10:00 前完成最新開獎與下期預測。
    - cron: "48 1 * * *"
    - cron: "49 1 * * *"
    - cron: "50 1 * * *"
    - cron: "52 1 * * *"
    - cron: "55 1 * * *"
    - cron: "58 1 * * *"
    - cron: "0 2 * * *"
    # 台灣冬令開獎後嚴格更新窗：10:48-11:00。
    - cron: "48 2 * * *"
    - cron: "49 2 * * *"
    - cron: "50 2 * * *"
    - cron: "55 2 * * *"
    - cron: "0 3 * * *"
    # 台灣 13:00 強制完整重新運算、回測、檢討、戰報重建。
    - cron: "0 5 * * *"
    # 台灣 21:45 保險檢查。
    - cron: "45 13 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update Tiantianle data and reports with post-draw retry
        env:
          TIANTIANLE_CORE_BACKTEST_ROUNDS: "30"
          TIANTIANLE_PACK_GOVERNANCE_ROUNDS: "30"
          TIANTIANLE_PRECISION_TOURNAMENT_ROUNDS: "30"
          TIANTIANLE_INDUSTRIAL_BACKTEST_ROUNDS: "30"
          TIANTIANLE_ADVANCED_BACKTEST_ROUNDS: "30"
          TIANTIANLE_UNLIKELY_BACKTEST_ROUNDS: "30"
          TIANTIANLE_GROUP_BACKTEST_SHORT: "30"
          TIANTIANLE_GROUP_BACKTEST_MID: "60"
          TIANTIANLE_GROUP_BACKTEST_LONG: "120"
        shell: bash
        run: |
          set -e
          for attempt in $(seq 1 10); do
            echo "post-draw update attempt ${attempt}/10"
            timeout 180 python "美國加州天天樂_20260618_第1版.py" || python offline_full_history_recalc.py
            python pages_build.py
            python sanitize_public_outputs.py
            if python - <<'PY'
          import json
          import sys
          from datetime import datetime
          from zoneinfo import ZoneInfo

          with open("reports/latest_analysis.json", encoding="utf-8") as fh:
              analysis = json.load(fh)
          freshness = analysis.get("freshness") or {}
          latest = freshness.get("latest_draw_date") or (analysis.get("latest_draw") or {}).get("draw_date")
          target = analysis.get("target_draw_date")
          safe_text = freshness.get("target_taiwan_safe_update_time")
          now = datetime.now(ZoneInfo("Asia/Taipei"))
          if safe_text:
              safe_time = datetime.strptime(safe_text, "%Y-%m-%d %H:%M").replace(tzinfo=ZoneInfo("Asia/Taipei"))
              if now < safe_time:
                  seconds = (safe_time - now).total_seconds()
                  if seconds <= 300:
                      print(f"near safe update time; keep polling: now={now:%Y-%m-%d %H:%M}, safe={safe_text}")
                      sys.exit(1)
                  print(f"before safe update time: now={now:%Y-%m-%d %H:%M}, safe={safe_text}")
                  sys.exit(0)
          if not target or latest == target:
              print(f"latest draw reached target: latest={latest}, target={target}")
              sys.exit(0)
          print(f"latest source still old: latest={latest}, target={target}; retrying")
          sys.exit(1)
          PY
            then
              break
            fi
            if [ "$attempt" = "10" ]; then
              echo "latest draw still not available by the strict 10:00 window; 13:00 mandatory recalculation will retry and rebuild"
              break
            fi
            sleep 60
          done
      - name: Commit updated data
        run: |
          git config user.name "tiantianle automation"
          git config user.email "actions@users.noreply.github.com"
          git add data reports site
          git diff --cached --quiet || git commit -m "Update Tiantianle data and reports"
          git push
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

