name: daily-tiantianle-update

on:
  workflow_dispatch:
  schedule:
    # Taiwan post-draw retry window, for California daylight saving draw updates.
    - cron: "50 1 * * *"
    - cron: "55 1 * * *"
    - cron: "0 2 * * *"
    - cron: "5 2 * * *"
    - cron: "10 2 * * *"
    - cron: "15 2 * * *"
    - cron: "20 2 * * *"
    - cron: "25 2 * * *"
    - cron: "30 2 * * *"
    - cron: "40 2 * * *"
    # Taiwan post-draw retry window, for California standard time draw updates.
    - cron: "50 2 * * *"
    - cron: "55 2 * * *"
    - cron: "0 3 * * *"
    - cron: "5 3 * * *"
    - cron: "10 3 * * *"
    - cron: "15 3 * * *"
    - cron: "20 3 * * *"
    - cron: "30 3 * * *"
    # Evening safety refresh.
    - cron: "45 13 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update Tiantianle data and reports with post-draw retry
        env:
          TIANTIANLE_CORE_BACKTEST_ROUNDS: "60"
          TIANTIANLE_INDUSTRIAL_BACKTEST_ROUNDS: "60"
          TIANTIANLE_ADVANCED_BACKTEST_ROUNDS: "40"
          TIANTIANLE_UNLIKELY_BACKTEST_ROUNDS: "40"
          TIANTIANLE_GROUP_BACKTEST_SHORT: "30"
          TIANTIANLE_GROUP_BACKTEST_MID: "60"
          TIANTIANLE_GROUP_BACKTEST_LONG: "120"
        shell: bash
        run: |
          set -e
          for attempt in $(seq 1 10); do
            echo "post-draw update attempt ${attempt}/10"
            python "美國加州天天樂_20260618_第1版.py"
            python pages_build.py
            if python - <<'PY'
          import json
          import sys
          from datetime import datetime
          from zoneinfo import ZoneInfo

          with open("reports/latest_analysis.json", encoding="utf-8") as fh:
              analysis = json.load(fh)
          freshness = analysis.get("freshness") or {}
          latest = freshness.get("latest_draw_date") or (analysis.get("latest_draw") or {}).get("draw_date")
          target = analysis.get("target_draw_date")
          safe_text = freshness.get("target_taiwan_safe_update_time")
          now = datetime.now(ZoneInfo("Asia/Taipei"))
          if safe_text:
              safe_time = datetime.strptime(safe_text, "%Y-%m-%d %H:%M").replace(tzinfo=ZoneInfo("Asia/Taipei"))
              if now < safe_time:
                  print(f"before safe update time: now={now:%Y-%m-%d %H:%M}, safe={safe_text}")
                  sys.exit(0)
          if not target or latest == target:
              print(f"latest draw reached target: latest={latest}, target={target}")
              sys.exit(0)
          print(f"latest source still old: latest={latest}, target={target}; retrying")
          sys.exit(1)
          PY
            then
              break
            fi
            if [ "$attempt" = "10" ]; then
              echo "latest draw still not available after retry window; later schedule will retry"
              break
            fi
            sleep 180
          done
      - name: Commit updated data
        run: |
          git config user.name "tiantianle automation"
          git config user.email "actions@users.noreply.github.com"
          git add data reports site
          git diff --cached --quiet || git commit -m "Update Tiantianle data and reports"
          git push
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
